spring:
  application:
    name: ntyqb-backend
  datasource:
    url: jdbc:h2:file:./data/ntyqb;AUTO_SERVER=TRUE;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
server:
  port: 8080

app:
  auth:
    mode: wechat
    session-days: 14
    wechat:
      app-id: wx3526da7c39a4fc64
      app-secret: ${WECHAT_MINIAPP_SECRET:}
      api-base-url: https://api.weixin.qq.com
  user-tags:
    by-id:
      1: VIP
  seed:
    enabled: true
  upload:
    root-dir: ./data/uploads
    public-base-url: https://niyoushashilia.cloud
