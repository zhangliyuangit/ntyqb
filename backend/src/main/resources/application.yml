spring:
  application:
    name: ntyqb-backend
  datasource:
    url: jdbc:h2:file:./data/ntyqb;AUTO_SERVER=TRUE;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
server:
  port: 8080

app:
  auth:
    mode: mock
    session-days: 14
  seed:
    enabled: true
